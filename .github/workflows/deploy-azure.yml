name: deploy-azure

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-backend-appservice:
    if: ${{ vars.AZURE_BACKEND_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy backend (zip deploy)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_APP_NAME }}
          package: backend

  deploy-frontend-appservice:
    if: ${{ vars.AZURE_FRONTEND_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy frontend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_FRONTEND_APP_NAME }}
          package: dist
